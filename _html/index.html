function articleUrl(year, filename) {
  return GITHUB_BASE + '/' + year + '/' + filename;
}
function readmeUrl(year) {
  return articleUrl(year, 'README.md');
}
function prefaceUrl(year) {
  return articleUrl(year, 'preface.md');
}
function historyUrl(year) {
  return articleUrl(year, 'history.md');
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function getEra(y) {
  const n = parseInt(y);
  if (n <= 1913) return { id: 'pioneer', label: '探索時代 1901–1913', color: '#8b6914' };
  if (n <= 1945) return { id: 'war', label: '戰爭時代 1914–1945', color: '#8b2020' };
  if (n <= 1969) return { id: 'golden', label: '黃金時代 1945–1969', color: '#208b40' };
  if (n <= 1999) return { id: 'digital', label: '數位時代 1970–1999', color: '#3050c0' };
  if (n <= 2019) return { id: 'net', label: '網路時代 2000–2019', color: '#4060d0' };
  return { id: 'ai', label: 'AI 時代 2020–2026', color: '#8040c0' };
}

/* ========== TABS ========== */
function setupTabs() {
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      const el = document.getElementById('view-' + t.dataset.view);
      if (el) el.classList.add('active');
    });
  });
}

function switchView(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === name));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const el = document.getElementById('view-' + name);
  if (el) el.classList.add('active');
}

/* ========== TIMELINE ========== */
let currentYear = '1901';

function buildTimelineView() {
  const main = document.getElementById('app');
  const years = Object.keys(DATA).sort();
  const container = document.createElement('div');
  container.id = 'view-timeline';
  container.className = 'view active';

  const tlBar = document.createElement('div');
  tlBar.className = 'tl-bar';
  years.forEach(y => {
    const seg = document.createElement('div');
    seg.style.background = getEra(y).color;
    seg.dataset.year = y;
    seg.title = y;
    seg.addEventListener('click', () => goYear(y));
    tlBar.appendChild(seg);
  });
  container.appendChild(tlBar);

  const slider = document.createElement('input');
  slider.type = 'range';
  slider.className = 'year-slider';
  slider.min = years[0];
  slider.max = years[years.length - 1];
  slider.value = years[0];
  slider.id = 'yearSlider';
  container.appendChild(slider);

  const nav = document.createElement('div');
  nav.className = 'nav-area';
  nav.innerHTML = `
    <button class="nav-btn" id="prevBtn">◀</button>
    <div class="year-display">
      <div class="year-number" id="yearNumber"><a href="${readmeUrl(years[0])}" target="_blank">${years[0]}</a></div>
      <div class="year-theme" id="yearTheme"><a href="${prefaceUrl(years[0])}" target="_blank">載入中⋯</a></div>
      <a class="era-badge" id="eraBadge" href="${readmeUrl(years[0])}" target="_blank"></a>
    </div>
    <button class="nav-btn" id="nextBtn">▶</button>
  `;
  container.appendChild(nav);

  const cards = document.createElement('div');
  cards.className = 'cards fade-in';
  cards.id = 'tlCards';
  container.appendChild(cards);
  main.appendChild(container);

  slider.addEventListener('input', e => goYear(parseInt(e.target.value)));
  nav.querySelector('#prevBtn').addEventListener('click', () => {
    const cur = parseInt(document.getElementById('yearNumber').textContent);
    if (cur > parseInt(years[0])) goYear(cur - 1);
  });
  nav.querySelector('#nextBtn').addEventListener('click', () => {
    const cur = parseInt(document.getElementById('yearNumber').textContent);
    if (cur < parseInt(years[years.length - 1])) goYear(cur + 1);
  });
  document.addEventListener('keydown', e => {
    const cur = parseInt(document.getElementById('yearNumber').textContent);
    if (e.key === 'ArrowLeft' && cur > parseInt(years[0])) goYear(cur - 1);
    if (e.key === 'ArrowRight' && cur < parseInt(years[years.length - 1])) goYear(cur + 1);
  });
  goYear(years[0]);
}

function goYear(y) {
  currentYear = String(y);
  const d = DATA[currentYear];
  if (!d) return;

  const rUrl = readmeUrl(currentYear);
  const pUrl = prefaceUrl(currentYear);
  document.getElementById('yearNumber').innerHTML = `<a href="${rUrl}" target="_blank">${currentYear} ↗</a>`;
  document.getElementById('yearSlider').value = currentYear;

  const era = getEra(currentYear);
  const badge = document.getElementById('eraBadge');
  badge.textContent = era.label;
  badge.className = 'era-badge era-' + era.id;
  badge.href = rUrl;

  document.querySelectorAll('.tl-bar div').forEach(s => {
    s.classList.toggle('active', s.dataset.year === currentYear);
  });

  const theme = document.getElementById('yearTheme');
  const firstItem = d.science && d.science[0] ? d.science[0].split('：')[0].substring(0, 20) + '⋯' : (currentYear + ' 年科學技術');
  theme.innerHTML = `<a href="${pUrl}" target="_blank">${esc(firstItem)} ↗</a>`;

  renderTLCards(currentYear);
}

function renderTLCards(year) {
  const d = DATA[year];
  if (!d) return;
  const c = document.getElementById('tlCards');
  c.innerHTML = '';

  const hasScience = d.science && d.science.length > 0 && d.science[0] !== '';
  const hasTech = d.tech && d.tech.length > 0 && d.tech[0] !== '';
  const hasProduct = d.product && d.product.length > 0 && d.product[0] !== '';

  if (!hasScience && !hasTech && !hasProduct) {
    c.innerHTML = '<div class="card" style="grid-column:1/-1;text-align:center;padding:2rem;color:#556;">📚 ' + year + ' 年的資料整理中</div>';
    return;
  }

  if (hasScience) c.appendChild(makeTLCard('science', '🔬 科學', d.science));
  if (hasTech) c.appendChild(makeTLCard('tech', '⚙️ 技術', d.tech));
  if (hasProduct) c.appendChild(makeTLCard('product', '📦 產品', d.product));
  c.appendChild(makeTLNobel(d.nobel));
  c.appendChild(makeTLHistory());
}

function makeTLCard(type, title, items) {
  const fnames = { science: 'science', tech: 'technology', product: 'product' };
  const prefix = fnames[type] || type;
  const rUrl = readmeUrl(currentYear);
  const div = document.createElement('div');
  div.className = 'card card-' + type;
  let h = `<h3><a href="${rUrl}" target="_blank">${title} ↗</a></h3><ul>`;
  items.forEach((it, idx) => {
    if (it) {
      const fn = prefix + (idx + 1) + '.md';
      const url = articleUrl(currentYear, fn);
      h += `<li><a href="${url}" target="_blank">${esc(it)} ↗</a></li>`;
    }
  });
  h += '</ul>';
  div.innerHTML = h;
  return div;
}

function makeTLNobel(n) {
  const yr = currentYear;
  const div = document.createElement('div');
  div.className = 'card card-nobel';
  const rUrl = readmeUrl(yr);
  if (!n || !n.awarded) {
    div.innerHTML = `<h3><a href="${rUrl}" target="_blank">🏆 諾貝爾獎 ↗</a></h3><div style="padding:0.4rem 0;color:#556;font-size:0.85rem;">本年未頒發</div><a href="${articleUrl(yr, 'nobel.md')}" class="card-footer-link" target="_blank">📖 閱讀詳情 ↗</a>`;
    return div;
  }
  const fieldFiles = { physics: 'nobel_physics', chemistry: 'nobel_chemistry', physiology: 'nobel_physiology' };
  let h = `<h3><a href="${rUrl}" target="_blank">🏆 諾貝爾獎 ↗</a></h3>`;
  ['physics','chemistry','physiology'].forEach(k => {
    if (n[k] && !n[k].includes('停發') && !n[k].includes('未頒發')) {
      const fn = fieldFiles[k] + '.md';
      const url = articleUrl(yr, fn);
      const label = k === 'physics' ? '物理' : k === 'chemistry' ? '化學' : '醫學';
      h += `<div class="nobel-item"><span class="nobel-field">${label}</span><span class="nobel-detail"><a href="${url}" target="_blank">${esc(n[k])} ↗</a></span></div>`;
    }
  });
  h += `<a href="${articleUrl(yr, 'nobel.md')}" class="card-footer-link" target="_blank">📖 閱讀詳情 ↗</a>`;
  if (n.note) h += `<div class="nobel-note">📌 ${esc(n.note)}</div>`;
  div.innerHTML = h;
  return div;
}

function makeTLHistory() {
  const yr = currentYear;
  const div = document.createElement('div');
  div.className = 'card';
  div.style.borderColor = '#3a2a1a';
  div.innerHTML = `<h3 style="color:#c0a070;border-color:#3a2a1a;"><a href="${readmeUrl(yr)}" target="_blank" style="color:inherit;text-decoration:none;">📜 歷史穿梭 ↗</a></h3>
    <a href="${historyUrl(yr)}" class="card-footer-link" target="_blank">📖 連結過去與未來 ↗</a>
    <a href="${articleUrl(yr, 'h_economics.md')}" class="card-footer-link" target="_blank">💰 經濟穿梭 ↗</a>
    <a href="${articleUrl(yr, 'h_military.md')}" class="card-footer-link" target="_blank">⚔️ 軍事穿梭 ↗</a>
    <a href="${articleUrl(yr, 'h_politics.md')}" class="card-footer-link" target="_blank">🏛️ 政治穿梭 ↗</a>
    <a href="${articleUrl(yr, 'h_thoughts.md')}" class="card-footer-link" target="_blank">💭 思想穿梭 ↗</a>`;
  return div;
}

/* ========== CATEGORY VIEWS ========== */
function buildCategoryView(catKey) {
  const main = document.getElementById('app');
  const container = document.createElement('div');
  container.id = 'view-' + catKey;
  container.className = 'view';

  const filterBar = document.createElement('div');
  filterBar.className = 'cat-filters';
  const eras = [
    { id: 'all', label: '全部' },
    { id: 'pioneer', label: '🕰 探索 1901–1913' },
    { id: 'war', label: '⚔️ 戰爭 1914–1945' },
    { id: 'golden', label: '🌟 黃金 1945–1969' },
    { id: 'digital', label: '💻 數位 1970–1999' },
    { id: 'net', label: '🌐 網路 2000–2019' },
    { id: 'ai', label: '🤖 AI 2020–2026' },
  ];
  eras.forEach(e => {
    const btn = document.createElement('span');
    btn.className = 'cat-filter' + (e.id === 'all' ? ' active' : '');
    btn.textContent = e.label;
    btn.dataset.era = e.id;
    btn.addEventListener('click', () => {
      filterBar.querySelectorAll('.cat-filter').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
      renderCatList(catKey, e.id);
    });
    filterBar.appendChild(btn);
  });
  container.appendChild(filterBar);

  const list = document.createElement('div');
  list.className = 'cat-list';
  list.id = 'catList-' + catKey;
  container.appendChild(list);
  main.appendChild(container);
  renderCatList(catKey, 'all');
}

function renderCatList(catKey, eraFilter) {
  const list = document.getElementById('catList-' + catKey);
  list.innerHTML = '';
  const years = Object.keys(DATA).sort((a, b) => a - b);
  const fnames = { science: 'science', tech: 'technology', product: 'product' };
  const prefix = fnames[catKey] || catKey;

  const items = [];
  years.forEach(y => {
    const d = DATA[y];
    if (!d) return;
    const arr = d[catKey];
    if (!arr || arr.length === 0 || arr[0] === '') return;
    const era = getEra(y);
    if (eraFilter !== 'all' && era.id !== eraFilter) return;
    arr.forEach((item, idx) => {
      if (item) items.push({ year: y, text: item, idx });
    });
  });

  if (items.length === 0) {
    list.innerHTML = '<div class="nobel-empty">沒有符合的資料</div>';
    return;
  }

  items.forEach(it => {
    const div = document.createElement('div');
    div.className = 'cat-item fade-in';
    const fn = prefix + (it.idx + 1) + '.md';
    const url = articleUrl(it.year, fn);
    div.innerHTML = `
      <span class="cicon">${it.idx === 0 ? '★' : '·'}</span>
      <span class="cyear"><a href="${readmeUrl(it.year)}" target="_blank">${it.year} ↗</a></span>
      <span class="ctext"><a href="${url}" target="_blank">${esc(it.text)} ↗</a></span>
    `;
    list.appendChild(div);
  });
}

function buildScienceView() { buildCategoryView('science'); }
function buildTechView() { buildCategoryView('tech'); }
function buildProductView() { buildCategoryView('product'); }

  const main = document.getElementById('app');
  const container = document.createElement('div');
  container.id = 'view-nobel';
  container.className = 'view';

  const top = document.createElement('div');
  top.className = 'nobel-top';
  const cats = [
    { id: 'all', label: '🏆 全部' },
    { id: 'physics', label: '🔬 物理學' },
    { id: 'chemistry', label: '🧪 化學' },
    { id: 'physiology', label: '💊 生理醫學' },
  ];
  cats.forEach(c => {
    const btn = document.createElement('span');
    btn.className = 'nobel-tab' + (c.id === 'all' ? ' active' : '');
    btn.textContent = c.label;
    btn.dataset.ncat = c.id;
    btn.addEventListener('click', () => {
      top.querySelectorAll('.nobel-tab').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
      renderNobelList(c.id);
    });
    top.appendChild(btn);
  });
  container.appendChild(top);

  const list = document.createElement('div');
  list.className = 'nobel-list';
  list.id = 'nobelList';
  container.appendChild(list);
  main.appendChild(container);
  renderNobelList('all');
}

function renderNobelList(filter) {
  const list = document.getElementById('nobelList');
  list.innerHTML = '';
  const years = Object.keys(DATA).sort((a, b) => a - b);
  const fieldFiles = { physics: 'nobel_physics', chemistry: 'nobel_chemistry', physiology: 'nobel_physiology' };

  const entries = [];
  years.forEach(y => {
    const d = DATA[y];
    if (!d || !d.nobel || !d.nobel.awarded) return;
    const n = d.nobel;
    const cats = [
      { key: 'physics', label: '物理' },
      { key: 'chemistry', label: '化學' },
      { key: 'physiology', label: '醫學' },
    ];
    cats.forEach(c => {
      if (n[c.key] && !n[c.key].includes('停發') && !n[c.key].includes('未頒發') && !n[c.key].includes('（本年')) {
        if (filter === 'all' || filter === c.key) {
          entries.push({ year: y, cat: c.key, catLabel: c.label, text: n[c.key], file: fieldFiles[c.key] });
        }
      }
    });
  });

  if (entries.length === 0) {
    list.innerHTML = '<div class="nobel-empty">沒有符合的資料</div>';
    return;
  }

  entries.forEach(e => {
    const div = document.createElement('div');
    div.className = 'nobel-entry fade-in';
    const url = articleUrl(e.year, e.file + '.md');
    div.innerHTML = `
      <span class="nyear"><a href="${readmeUrl(e.year)}" target="_blank">${e.year} ↗</a></span>
      <span class="ncat n-${e.cat}">${e.catLabel}</span>
      <span class="ndetail"><a href="${url}" target="_blank">${esc(e.text)} ↗</a></span>
    `;
    list.appendChild(div);
  });
}

/* ========== INFERENCE ========== */
function buildInferenceView() {
  const main = document.getElementById('app');
  const container = document.createElement('div');
  container.id = 'view-inference';
  container.className = 'view';
  container.innerHTML = INFERENCE_HTML;
  main.appendChild(container);
  enhanceCausalTrees('#view-inference');
}

function enhanceCausalTrees(containerId) {
  document.querySelectorAll(containerId + ' pre code').forEach(el => {
    const text = el.textContent;
    const pre = el.parentNode;
    if (text.includes('←────→') || text.includes('←───→')) {
      const raw = document.createElement('pre');
      raw.className = 'causal-tree-raw';
      raw.textContent = text;
      pre.parentNode.replaceChild(raw, pre);
      return;
    }
    const lines = text.split('\n');
    const html = lines.map(line => processTreeLine(line)).join('\n');
    const div = document.createElement('div');
    div.className = 'causal-tree';
    div.innerHTML = html;
    pre.parentNode.replaceChild(div, pre);
  });
}

function processTreeLine(line) {
  if (line.trim() === '') return '';
  const m = line.match(/^(\s*[├└│\s─→>]*\s*)(.+)$/);
  if (!m) return esc(line);
  let styled = '';
  for (const ch of m[1]) {
    styled += '├└│─→>'.includes(ch) ? '<span class="tc">' + ch + '</span>' : ch;
  }
  const rest = m[2].replace(/[├└]→/g, '→').trim();
  const segments = rest.split(/\s*→\s*/).filter(s => s.trim());
  if (segments.length === 0) return styled;
  const linked = segments.map(seg => {
    const y = seg.match(/^(.+?)\s*\((\d{4}s?(?:\s*-\s*\d{4})?)\)\s*$/);
    let concept, year;
    if (y) { concept = y[1].trim(); year = y[2]; }
    else { concept = seg.replace(/\s*\([^)]*\)\s*$/, '').trim(); year = null; }
    const url = getConceptUrl(concept);
    const link = '<a href="' + url + '" target="_blank" rel="noopener">' + esc(concept) + '</a>';
    return year ? link + ' <span class="ty">(' + esc(year) + ')</span>' : link;
  });
  return styled + linked.join(' <span class="tc">→</span> ');
}

function getConceptUrl(concept) {
  const wiki = 'https://zh.wikipedia.org/wiki/';
  const map = {
    'GPS': '全球定位系统', 'LED': 'LED', 'MRI': '磁共振成像',
    'PCR': '聚合酶链式反应', 'CRISPR': 'CRISPR', 'CAR-T': 'CAR-T',
    'QWERTY': 'QWERTY', 'GPU': '图形处理器', 'WiFi': 'Wi-Fi',
    'x86': 'X86', 'AI': '人工智能', 'V-2 火箭': 'V-2火箭',
    'TCP/IP': 'TCP/IP协议族', 'ENIAC': 'ENIAC', 'LIGO': 'LIGO',
    'mRNA 疫苗': 'mRNA疫苗', 'mRNA': '信使核糖核酸',
    'Siri': 'Siri', 'MP3': 'MP3', 'iPhone': 'iPhone',
    'DNA 雙螺旋結構': 'DNA', 'DNA 結構': 'DNA',
    'DNA 鑑定': 'DNA分型', 'DNA 定序': 'DNA测序',
    'DNA 是遺傳物質': 'DNA', 'C 語言': 'C语言',
    'AlphaGo': 'AlphaGo', 'AlphaFold': 'AlphaFold',
    'ChatGPT': 'ChatGPT', 'CRISPR 基因編輯': 'CRISPR',
    'HIV 治療': 'HIV', 'QR Code': 'QR码',
    'CAR-T 治療': 'CAR-T', 'PC 革命': '個人電腦',
    // Math-specific mappings
    'FFT': '快速傅里叶变换', 'DFT': '离散傅里叶变换',
    'DCT': '离散余弦变换', 'MDCT': '改进的离散余弦变换',
    'OFDM': 'OFDM', 'PID 控制': 'PID控制器',
    'SVD': '奇异值分解', 'PCA': '主成分分析',
    'PageRank': 'PageRank', 'LSTM': '长短期记忆',
    'CNN': '卷积神经网络', 'RNN': '循环神经网络',
    'RSA 加密': 'RSA加密算法', 'HTTPS': 'HTTPS',
    'GPU 運算': '通用图形处理器', 'SPICE': 'SPICE',
    'QR Code': 'QR码', 'Dijkstra 演算法': '戴克斯特拉算法',
    'RSA 加密演算法': 'RSA加密算法',
    '橢圓曲線密碼學': '椭圆曲线密码学',
    'A/B 測試': 'A/B测试',
    '梯度下降法': '梯度下降法',
    '最小平方法': '最小二乘法',
    '支援向量機': '支持向量机',
    'PageRank 演算法': 'PageRank',
    '有限元素法': '有限元法',
    '知識圖譜': '知识图谱',
    'Google Maps': 'Google地图',
  };
  if (map[concept]) return wiki + map[concept];
  return wiki + encodeURIComponent(concept);
}

/* ========== SEARCH ========== */
function buildSearchView() {
  const main = document.getElementById('app');
  const container = document.createElement('div');
  container.id = 'view-search';
  container.className = 'view';

  const bar = document.createElement('div');
  bar.className = 'search-bar';
  bar.innerHTML = '<input type="text" id="searchInput" placeholder="搜尋科學、技術、產品、諾貝爾獎⋯">';
  container.appendChild(bar);

  const count = document.createElement('div');
  count.className = 'search-count';
  count.id = 'searchCount';
  container.appendChild(count);

  const list = document.createElement('div');
  list.className = 'cat-list';
  list.id = 'searchList';
  container.appendChild(list);

  main.appendChild(container);

  let timer;
  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(doSearch, 250);
  });
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const list = document.getElementById('searchList');
  const count = document.getElementById('searchCount');

  if (!q) {
    list.innerHTML = '<div class="nobel-empty">請輸入關鍵字搜尋</div>';
    count.textContent = '';
    return;
  }

  const years = Object.keys(DATA).sort((a, b) => a - b);
  const results = [];
  const catNames = { science: '🔬 科學', tech: '⚙️ 技術', product: '📦 產品', nobel: '🏆 諾貝爾' };

  years.forEach(y => {
    const d = DATA[y];
    if (!d) return;
    ['science', 'tech', 'product'].forEach(cat => {
      const arr = d[cat];
      if (arr) arr.forEach(item => {
        if (item && item.toLowerCase().includes(q)) {
          results.push({ year: y, cat, catLabel: catNames[cat], text: item, idx: 0 });
        }
      });
    });
    if (d.nobel && d.nobel.awarded) {
      ['physics', 'chemistry', 'physiology'].forEach(k => {
        if (d.nobel[k] && d.nobel[k].toLowerCase().includes(q)) {
          results.push({ year: y, cat: 'nobel', catLabel: catNames.nobel, text: d.nobel[k], idx: 0 });
        }
      });
    }
  });

  count.textContent = `找到 ${results.length} 筆結果`;
  list.innerHTML = '';
  if (results.length === 0) {
    list.innerHTML = '<div class="nobel-empty">沒有符合的結果</div>';
    return;
  }

  const fnames = { science: 'science', tech: 'technology', product: 'product', nobel: 'nobel' };
  results.forEach(r => {
    const div = document.createElement('div');
    div.className = 'cat-item';
    const prefix = fnames[r.cat] || r.cat;
    const fn = r.cat === 'nobel' ? 'nobel.md' : prefix + '1.md';
    const url = articleUrl(r.year, fn);
    div.innerHTML = `
      <span class="cyear"><a href="${readmeUrl(r.year)}" target="_blank">${r.year} ↗</a></span>
      <span class="ctext"><a href="${url}" target="_blank">${esc(r.catLabel)} · ${esc(r.text)} ↗</a></span>
    `;
    list.appendChild(div);
  });
}
