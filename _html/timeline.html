const ERA_COLORS = {
  pioneer: { bg: "#5c3a1e", fg: "#f0d5a0", label: "🕰 探索時代 1901–1913", bar: "#8b6914" },
  war:     { bg: "#4a1a1a", fg: "#e8a0a0", label: "⚔ 戰爭時代 1914–1945", bar: "#8b2020" },
  golden:  { bg: "#1e4a3a", fg: "#a0e0c0", label: "🌟 黃金時代 1945–1969", bar: "#208b40" },
  digital: { bg: "#1a2a5a", fg: "#a0b0f0", label: "💻 數位時代 1970–1999", bar: "#3050c0" },
  net:     { bg: "#2a3a5a", fg: "#b0c0ff", label: "🌐 網路時代 2000–2019", bar: "#4060d0" },
  ai:      { bg: "#3a1a5a", fg: "#d0a0f0", label: "🤖 AI 時代 2020–2026", bar: "#8040c0" }
};

function getEra(year) {
  const y = parseInt(year);
  if (y <= 1913) return "pioneer";
  if (y <= 1945) return "war";
  if (y <= 1969) return "golden";
  if (y <= 1999) return "digital";
  if (y <= 2019) return "net";
  return "ai";
}

function getYearData(year) {
  return DATA[year] || null;
}

function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function buildTimeline() {
  const tl = document.getElementById("miniTimeline");
  tl.innerHTML = "";
  for (let y = 1901; y <= 2026; y++) {
    const seg = document.createElement("div");
    seg.className = "tl-seg";
    const era = getEra(y);
    seg.style.background = ERA_COLORS[era].bar;
    seg.dataset.year = y;
    seg.addEventListener("click", () => goToYear(y));
    tl.appendChild(seg);
  }
}

function updateDisplay(year) {
  currentYear = year;
  const d = getYearData(year);
  const era = getEra(year);
  const ec = ERA_COLORS[era];

  const rUrl = readmeUrl(year);
  const pUrl = prefaceUrl(year);

  document.getElementById("yearNumber").innerHTML = `<a href="${rUrl}" target="_blank">${year}</a>`;
  document.getElementById("yearTheme").innerHTML = `<a href="${pUrl}" target="_blank">${d ? escapeHtml(d.theme) : '資料整理中⋯'} ↗</a>`;
  document.getElementById("yearSlider").value = year;

  const badge = document.getElementById("eraBadge");
  badge.textContent = ec.label;
  badge.className = "era-badge era-" + era;
  badge.href = rUrl;

  document.querySelectorAll(".tl-seg").forEach(s => {
    s.classList.toggle("active", s.dataset.year === String(year));
  });

  const container = document.getElementById("cardsContainer");
  container.className = "cards fade-in";
  container.innerHTML = "";

  if (!d) {
    container.innerHTML = `<div class="card" style="grid-column:1/-1;text-align:center;padding:3rem;color:#667;"><p>📚 ${year} 年的資料整理中</p></div>`;
    return;
  }

  container.innerHTML += makeCard("science", "🔬 科學", d.science);
  container.innerHTML += makeCard("tech", "⚙ 技術", d.tech);
  container.innerHTML += makeCard("product", "📦 產品", d.product);
  container.innerHTML += makeNobelCard(d.nobel);
  container.innerHTML += makeHistoryCard();
}

function makeCard(type, title, items) {
  const fnames = { science: 'science', tech: 'technology', product: 'product' };
  const prefix = fnames[type] || type;
  const rUrl = readmeUrl(currentYear);
  let html = `<div class="card card-${type}"><h3><a href="${rUrl}" target="_blank">${title} ↗</a></h3><ul>`;
  items.forEach((it, idx) => {
    if (it) {
      const fn = prefix + (idx + 1) + '.md';
      const url = articleUrl(currentYear, fn);
      html += `<li><a href="${url}" target="_blank">${escapeHtml(it)} ↗</a></li>`;
    }
  });
  html += "</ul></div>";
  return html;
}

function makeNobelCard(n) {
  const yr = currentYear;
  const rUrl = readmeUrl(yr);
  if (!n) return `<div class="card card-nobel"><h3><a href="${rUrl}" target="_blank">🏆 諾貝爾獎 ↗</a></h3><p style="color:#667;font-size:0.85rem;padding:0.5rem 0;">資料整理中</p></div>`;
  const fieldFiles = { physics: 'nobel_physics', chemistry: 'nobel_chemistry', physiology: 'nobel_physiology' };
  let html = `<div class="card card-nobel"><h3><a href="${rUrl}" target="_blank">🏆 諾貝爾獎 ↗</a></h3>`;
  if (n.awarded) {
    ['physics','chemistry','physiology'].forEach(k => {
      if (n[k] && !n[k].includes('停發') && !n[k].includes('未頒發')) {
        const fn = fieldFiles[k] + '.md';
        const url = articleUrl(yr, fn);
        const label = k === 'physics' ? '物理學' : k === 'chemistry' ? '化學' : '醫學';
        html += `<div class="nobel-item"><span class="nobel-field">${label}</span><span class="nobel-detail"><a href="${url}" target="_blank">${escapeHtml(n[k])} ↗</a></span></div>`;
      }
    });
  } else {
    html += `<div style="padding:0.5rem 0;"><span class="tag tag-nobel-none">未頒發</span></div>`;
  }
  html += `<a href="${articleUrl(yr, 'nobel.md')}" class="card-footer-link" target="_blank">📖 閱讀詳情 ↗</a>`;
  if (n.note) html += `<div class="nobel-note">📌 ${escapeHtml(n.note)}</div>`;
  html += "</div>";
  return html;
}

function makeHistoryCard() {
  const yr = currentYear;
  const rUrl = readmeUrl(yr);
  return `<div class="card" style="border-color:#3a2a1a;"><h3 style="color:#c0a070;border-color:#3a2a1a;"><a href="${rUrl}" target="_blank" style="color:inherit;text-decoration:none;">📜 歷史穿梭 ↗</a></h3>
    <a href="${historyUrl(yr)}" class="card-footer-link" target="_blank">📖 連結過去與未來 ↗</a>
    <a href="${articleUrl(yr, 'h_economics.md')}" class="card-footer-link" target="_blank">💰 經濟穿梭 ↗</a>
    <a href="${articleUrl(yr, 'h_military.md')}" class="card-footer-link" target="_blank">⚔️ 軍事穿梭 ↗</a>
    <a href="${articleUrl(yr, 'h_politics.md')}" class="card-footer-link" target="_blank">🏛️ 政治穿梭 ↗</a>
    <a href="${articleUrl(yr, 'h_thoughts.md')}" class="card-footer-link" target="_blank">💭 思想穿梭 ↗</a></div>`;
}

function goToYear(y) {
  window.scrollTo({ top: 0, behavior: "smooth" });
  updateDisplay(y);
}

document.getElementById("prevBtn").addEventListener("click", () => {
  const cur = parseInt(document.getElementById("yearNumber").textContent);
  if (cur > 1901) goToYear(cur - 1);
});
document.getElementById("nextBtn").addEventListener("click", () => {
  const cur = parseInt(document.getElementById("yearNumber").textContent);
  if (cur < 2026) goToYear(cur + 1);
});
document.getElementById("yearSlider").addEventListener("input", (e) => {
  goToYear(parseInt(e.target.value));
});
document.addEventListener("keydown", (e) => {
  const cur = parseInt(document.getElementById("yearNumber").textContent);
  if (e.key === "ArrowLeft" && cur > 1901) goToYear(cur - 1);
  if (e.key === "ArrowRight" && cur < 2026) goToYear(cur + 1);
});

buildTimeline();
goToYear(1901);
</script>
